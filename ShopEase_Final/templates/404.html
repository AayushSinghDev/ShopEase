{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — ShopEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d1b3e 0%, #162447 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: "Segoe UI", sans-serif; }
    .error-card { background: #fff; border-radius: 20px; padding: 50px 40px; text-align: center; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .error-code { font-size: 5rem; font-weight: 900; color: #f5a623; line-height: 1; }
    .error-title { font-size: 1.5rem; font-weight: 800; color: #0d1b3e; margin: 10px 0; }
    .error-msg { color: #888; font-size: 0.95rem; margin-bottom: 30px; }
    .btn-home { background: #0d1b3e; color: #f5a623; border: none; border-radius: 12px; padding: 12px 30px; font-weight: 800; font-size: 0.95rem; text-decoration: none; display: inline-block; transition: all 0.2s; }
    .btn-home:hover { background: #f5a623; color: #0d1b3e; }
    .btn-shop { background: transparent; color: #0d1b3e; border: 2px solid #0d1b3e; border-radius: 12px; padding: 11px 28px; font-weight: 700; font-size: 0.9rem; text-decoration: none; display: inline-block; margin-left: 10px; transition: all 0.2s; }
    .btn-shop:hover { background: #0d1b3e; color: #f5a623; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <div class="error-msg">Oops! The page you're looking for doesn't exist or has been moved.</div>
    <div>
      <a href="/" class="btn-home"><i class="bi bi-house-fill me-2"></i>Go Home</a>
      <a href="/products/" class="btn-shop"><i class="bi bi-shop me-2"></i>Browse Shop</a>
    </div>
  </div>
</body>
</html>
