<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — ShopEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d1b3e 0%, #162447 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: "Segoe UI", sans-serif; }
    .error-card { background: #fff; border-radius: 20px; padding: 50px 40px; text-align: center; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .error-code { font-size: 5rem; font-weight: 900; color: #dc3545; line-height: 1; }
    .error-title { font-size: 1.5rem; font-weight: 800; color: #0d1b3e; margin: 10px 0; }
    .error-msg { color: #888; font-size: 0.95rem; margin-bottom: 30px; }
    .btn-home { background: #0d1b3e; color: #f5a623; border: none; border-radius: 12px; padding: 12px 30px; font-weight: 800; font-size: 0.95rem; text-decoration: none; display: inline-block; }
    .btn-home:hover { background: #f5a623; color: #0d1b3e; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <div class="error-title">Something Went Wrong</div>
    <div class="error-msg">Our team has been notified. Please try again in a few moments.</div>
    <a href="/" class="btn-home"><i class="bi bi-house-fill me-2"></i>Go Home</a>
  </div>
</body>
</html>
