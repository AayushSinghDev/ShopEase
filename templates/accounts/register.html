<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase - Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0d1b3e;
        --navy-light: #162447;
        --orange: #f5a623;
        --orange-hover: #e09415;
      }

      body {
        background: linear-gradient(
          135deg,
          var(--navy) 0%,
          var(--navy-light) 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
        padding: 30px 15px;
      }

      .register-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        width: 100%;
        max-width: 520px;
      }

      .register-header {
        background: var(--navy);
        padding: 28px 30px;
        text-align: center;
      }

      .register-header h2 {
        color: var(--orange);
        font-weight: 800;
        font-size: 1.8rem;
        margin: 0;
      }

      .register-header p {
        color: rgba(255, 255, 255, 0.7);
        margin: 5px 0 0;
        font-size: 0.9rem;
      }

      .register-body {
        padding: 35px 40px;
      }

      .role-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        background: #f0f4ff;
        border-radius: 10px;
        padding: 6px;
      }

      .role-btn {
        flex: 1;
        border: none;
        background: transparent;
        border-radius: 8px;
        padding: 12px 5px;
        font-size: 0.88rem;
        font-weight: 600;
        color: #555;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }

      .role-btn i {
        font-size: 1.4rem;
      }

      .role-btn.active {
        background: var(--navy);
        color: var(--orange);
        box-shadow: 0 4px 12px rgba(13, 27, 62, 0.3);
      }

      .role-btn:hover:not(.active) {
        background: rgba(13, 27, 62, 0.08);
      }

      .form-label {
        font-weight: 600;
        color: var(--navy);
        font-size: 0.875rem;
      }

      .form-control {
        border: 2px solid #e0e7ff;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.9rem;
        transition: border-color 0.2s;
      }

      .form-control:focus {
        border-color: var(--orange);
        box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
      }

      .input-group .form-control {
        border-right: none;
      }

      .input-group-text {
        background: #f0f4ff;
        border: 2px solid #e0e7ff;
        border-left: none;
        border-radius: 0 8px 8px 0;
        cursor: pointer;
      }

      .btn-register {
        background: var(--orange);
        border: none;
        color: var(--navy);
        font-weight: 700;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        width: 100%;
        transition: all 0.25s ease;
      }

      .btn-register:hover {
        background: var(--orange-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(245, 166, 35, 0.4);
      }

      .login-link {
        text-align: center;
        font-size: 0.88rem;
        color: #666;
        margin-top: 18px;
      }

      .login-link a {
        color: var(--navy);
        font-weight: 700;
        text-decoration: none;
      }

      .login-link a:hover {
        color: var(--orange);
      }

      .seller-note {
        background: #fff8ec;
        border: 1px solid var(--orange);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.82rem;
        color: #7a5500;
        margin-bottom: 18px;
        display: none;
      }

      .seller-note i {
        color: var(--orange);
      }

      .alert-custom {
        border-radius: 8px;
        font-size: 0.875rem;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <div class="register-card">
      <div class="register-header">
        <h2><i class="bi bi-bag-heart-fill"></i> ShopEase</h2>
        <p>Create your account today</p>
      </div>

      <div class="register-body">
        <!-- Role Selector -->
        <div class="role-selector">
          <button
            class="role-btn active"
            onclick="setRole('customer')"
            id="btn-customer"
          >
            <i class="bi bi-person-fill"></i>
            Customer
          </button>
          <button class="role-btn" onclick="setRole('seller')" id="btn-seller">
            <i class="bi bi-shop"></i>
            Seller
          </button>
        </div>

        <!-- Seller Note -->
        <div class="seller-note" id="seller-note">
          <i class="bi bi-info-circle-fill me-1"></i>
          <strong>Seller accounts require admin approval</strong> before you can
          list products. You'll be notified once approved.
        </div>

        <!-- Messages -->
        {% if messages %} {% for message in messages %}
        <div
          class="alert alert-{{ message.tags }} alert-custom alert-dismissible fade show"
          role="alert"
        >
          {{ message }}
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        {% endfor %} {% endif %}

        <!-- Registration Form -->
        <form method="POST" action="{% url 'accounts:register' %}">
          {% csrf_token %}
          <input type="hidden" name="role" id="role-input" value="customer" />

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input
              type="tel"
              name="phone"
              class="form-control"
              placeholder="Enter your phone number"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input
                type="password"
                name="password"
                id="password-field"
                class="form-control"
                placeholder="Create a password"
                required
              />
              <span
                class="input-group-text"
                onclick="togglePassword('password-field', 'eye1')"
              >
                <i class="bi bi-eye" id="eye1"></i>
              </span>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <input
                type="password"
                name="confirm_password"
                id="confirm-field"
                class="form-control"
                placeholder="Confirm your password"
                required
              />
              <span
                class="input-group-text"
                onclick="togglePassword('confirm-field', 'eye2')"
              >
                <i class="bi bi-eye" id="eye2"></i>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-register">
            <i class="bi bi-person-plus-fill me-2"></i>Create Account
          </button>
        </form>

        <div class="login-link">
          Already have an account?
          <a href="{% url 'accounts:login' %}">Login here</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function setRole(role) {
        document
          .querySelectorAll(".role-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById("btn-" + role).classList.add("active");
        document.getElementById("role-input").value = role;
        document.getElementById("seller-note").style.display =
          role === "seller" ? "block" : "none";
      }

      function togglePassword(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon = document.getElementById(iconId);
        if (field.type === "password") {
          field.type = "text";
          icon.className = "bi bi-eye-slash";
        } else {
          field.type = "password";
          icon.className = "bi bi-eye";
        }
      }
    </script>
  </body>
</html>
